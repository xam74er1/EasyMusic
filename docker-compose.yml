version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easymusic-backend
    ports:
      - "8082:8082"
    volumes:
      - ./backend:/app
      - /app/.venv
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LOG_LEVEL=DEBUG
      - YTDLP_BROWSER=firefox
      - YTDLP_BROWSER_PROFILE=firefox_profile
    networks:
      - easymusic-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: easymusic-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - easymusic-net

networks:
  easymusic-net:
    driver: bridge
